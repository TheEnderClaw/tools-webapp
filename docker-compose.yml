services:
  tools-webapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tools-webapp
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.tools-webapp.rule=Host(`tools.enderclaw.net`)"
      - "traefik.http.routers.tools-webapp.entrypoints=websecure"
      - "traefik.http.routers.tools-webapp.tls=true"
      - "traefik.http.routers.tools-webapp.tls.certresolver=le"
      - "traefik.http.services.tools-webapp.loadbalancer.server.port=80"
    networks:
      - proxy

networks:
  proxy:
    external: true
